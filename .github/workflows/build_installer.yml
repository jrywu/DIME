name: Build


on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'src/**/*.rc'
      - 'src/**/*.def'
      - 'src/**/*.sln'
      - 'src/**/*.vcxproj'
      - 'src/**/*.vcxproj.filters'
      - 'installer/wix/**'
      - 'installer/*.ps1'
  pull_request:
    branches: [master]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'src/**/*.rc'
      - 'src/**/*.def'
      - 'src/**/*.sln'
      - 'src/**/*.vcxproj'
      - 'src/**/*.vcxproj.filters'
      - 'installer/wix/**'
      - 'installer/*.ps1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-installer:
    name: Build Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install MSVC Spectre libraries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstallPath) {
            throw "Visual Studio installation not found."
          }

          $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $components = @(
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "Microsoft.VisualStudio.Component.VC.Tools.ARM64",
            "Microsoft.VisualStudio.Component.VC.Tools.ARM64EC",
            "Microsoft.VisualStudio.Component.VC.14.44.17.14.x86.x64.Spectre",
            "Microsoft.VisualStudio.Component.VC.14.44.17.14.ARM64.Spectre",
            "Microsoft.VisualStudio.Component.VC.Runtimes.x86.x64.Spectre",
            "Microsoft.VisualStudio.Component.VC.Runtimes.ARM64.Spectre"
          )

          $arguments = @(
            "modify",
            "--installPath", $vsInstallPath,
            "--quiet",
            "--norestart",
            "--nocache"
          )
          foreach ($component in $components) {
            $arguments += @("--add", $component)
          }

          & $setup @arguments
          if ($LASTEXITCODE -eq 3010) {
            Write-Host "Visual Studio Installer requested a reboot; continuing on the hosted runner."
          } elseif ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $vcToolsRoot = Join-Path $vsInstallPath "VC\Tools\MSVC"
          $v143Tools = Get-ChildItem -Path $vcToolsRoot -Directory |
            Where-Object { $_.Name -like "14.44.*" } |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $v143Tools) {
            throw "MSVC v143 14.44 toolset not found under $vcToolsRoot."
          }

          foreach ($arch in @("x86", "x64", "arm64")) {
            $spectreDir = Join-Path $v143Tools.FullName "lib\spectre\$arch"
            if (-not (Test-Path $spectreDir)) {
              throw "MSVC v143 Spectre libraries missing: $spectreDir"
            }
          }

      - name: Build All Platforms (Release)
        shell: pwsh
        run: |
          cd src
          $builds = @(
            @{ Platform = "Win32"; Target = "DIME" },
            @{ Platform = "x64"; Target = "DIME" },
            @{ Platform = "ARM64"; Target = "DIME" },
            @{ Platform = "Win32"; Target = "DIMESettings" }
          )

          foreach ($build in $builds) {
            msbuild DIME.sln /p:Configuration=Release "/p:Platform=$($build.Platform)" /p:PlatformToolset=v143 "/t:$($build.Target)"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Install WiX Toolset v6
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add WixToolset.Util.wixext/6.0.2 --global
          wix extension add WixToolset.UI.wixext/6.0.2 --global
          wix extension add WixToolset.BootstrapperApplications.wixext/6.0.2 --global

      - name: Build Installer with PowerShell Script
        run: |
          cd installer
          ./deploy-wix-installer.ps1 -NonInteractive
        shell: pwsh


      - name: Commit test files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git add src/BuildInfo.h
          git add installer/DIME-Universal.zip
          git add installer/DIME-64bit.msi
          git add installer/DIME-32bit.msi
          git diff --staged --quiet || git commit -m "Update DIME installer and checksums [bot]"
          git pull --rebase
          git push
        shell: pwsh
